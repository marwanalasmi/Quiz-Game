<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="questions-text">Questions goes here</h2>
          <div class="quiz-info">
            <p>
              Questions <span class="current-questions">1</span> of
              <span class="last-questions">5</span>
            </p>
            <p>Score: <span id="score">0</span></p>
          </div>
        </div>
      </div>

      <div id="answers-container" class="answers-container"></div>

      <div class="progres-bar">
        <div id="progres" class="progres"></div>
      </div>
      <div id="result-screen" class="screen">
        <h2>Quiz Results</h2>
        <div class="result-info">
          <p>
            You scored <span class="final-score">0</span> out of
            <span class="max-score">5</span>
          </p>
          <div id="result-message">Good job!</div>
        </div>
        <button id="restart-btn">Restart Quiz</button>
      </div>
    </div>
  </body>
</html>
